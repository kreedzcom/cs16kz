// ============================================================================
//                       KZ Global API Configuration
// ============================================================================

// API Connection
kz_api_url      "wss://api.kreedz.com/ws/game"  // API WebSocket address
kz_api_token    ""                              // Your secret server API key

// Console & File Logging (0 = Disabled, 1 = Enabled)
kz_api_log_send     "1" // Log data sent to the API
kz_api_log_recv     "1" // Log data received from the API
kz_api_log_upload   "1" // Log replay uploads
kz_api_log_parse    "1" // Log playback (SR bot) parsing


// Playback (SR Bot) Settings
kz_api_bot_team     "1"     // Team for the bot to join (1 = T | 2 = CT)
kz_api_bot_use_cmd  "0"     // On/Off the use of the +use command for the bot (at the start &  end of the run)
kz_api_bot_prefix   "[SR]"  // Prefix added to the bot's nickname

// Retry Settings (For unacknowledged/failed data transmissions)
kz_api_retries_max      "4"  // Maximum number of attempts to resend data
kz_api_retries_delay    "5"  // Delay (in seconds) between resend attempts

// Other Settings
kz_api_replays_clevel   "16" // zstd compression level (Range: 1 - 22)
